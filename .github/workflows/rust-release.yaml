---
name: rust-release

'on':
  'workflow_call':
    inputs:
      binary-name:
        type: string
        required: true
      working-directory:
        type: string
        default: '.'
      rust-version:
        type: string
        default: 'stable'
      use-cross:
        type: boolean
        default: true
      extra-files:
        type: string
        default: 'README.md LICENSE'
      build-deb-rpm:
        type: boolean
        default: false
      package-description:
        type: string
        default: ''
      package-url:
        type: string
        default: ''
    secrets:
      gpg-private-key:
        required: false
      gpg-passphrase:
        required: false

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ${{ inputs.binary-name }}-linux-amd64.tar.gz
            exe_suffix: ""
            package_globs: |
              ${{ inputs.binary-name }}_amd64.deb
              ${{ inputs.binary-name }}-*.x86_64.rpm
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: ${{ inputs.binary-name }}-linux-arm64.tar.gz
            exe_suffix: ""
            package_globs: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ${{ inputs.binary-name }}-macos-arm64.tar.gz
            exe_suffix: ""
            package_globs: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ${{ inputs.binary-name }}-macos-amd64.tar.gz
            exe_suffix: ""
            package_globs: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ${{ inputs.binary-name }}-windows-amd64.zip
            exe_suffix: .exe
            package_globs: ""
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: ${{ inputs.binary-name }}-windows-arm64.zip
            exe_suffix: .exe
            package_globs: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ inputs.rust-version }}
          target: ${{ matrix.target }}
          cache: true
          cache-workspace: ${{ inputs.working-directory }}

      - name: Setup cross
        if: ${{ inputs.use-cross && matrix.target == 'aarch64-unknown-linux-gnu' }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build with cargo
        if: ${{ matrix.target != 'aarch64-unknown-linux-gnu' }}
        working-directory: ${{ inputs.working-directory }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build with cross
        if: ${{ inputs.use-cross && matrix.target == 'aarch64-unknown-linux-gnu' }}
        working-directory: ${{ inputs.working-directory }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare package directory (Unix)
        if: runner.os != 'Windows'
        run: |
          rm -rf release-package
          mkdir -p release-package
          cp "${{ inputs.working-directory }}/target/${{ matrix.target }}/release/${{ inputs.binary-name }}${{ matrix.exe_suffix }}" "release-package/${{ inputs.binary-name }}${{ matrix.exe_suffix }}"
          for extra_name in ${{ inputs.extra-files }}; do
            if [ -f "${{ inputs.working-directory }}/${extra_name}" ]; then
              cp "${{ inputs.working-directory }}/${extra_name}" "release-package/${extra_name}"
            fi
          done

      - name: Create tar.gz archive (Unix)
        if: runner.os != 'Windows'
        run: tar -C release-package -czf "${{ matrix.artifact_name }}" .

      - name: Prepare package directory (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force release-package -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path release-package | Out-Null
          Copy-Item "${{ inputs.working-directory }}/target/${{ matrix.target }}/release/${{ inputs.binary-name }}${{ matrix.exe_suffix }}" "release-package/${{ inputs.binary-name }}${{ matrix.exe_suffix }}"
          foreach ($extraName in @("${{ inputs.extra-files }}" -split ' ')) {
            if (Test-Path "${{ inputs.working-directory }}/$extraName") {
              Copy-Item "${{ inputs.working-directory }}/$extraName" "release-package/$extraName"
            }
          }

      - name: Create zip archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "release-package/*" -DestinationPath "${{ matrix.artifact_name }}" -Force

      - name: Build Linux packages (deb/rpm)
        if: ${{ inputs.build-deb-rpm && matrix.package_globs != '' }}
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
          sudo gem install --no-document fpm
          mkdir -p pkg/usr/bin
          install -m 0755 "${{ inputs.working-directory }}/target/${{ matrix.target }}/release/${{ inputs.binary-name }}" pkg/usr/bin/${{ inputs.binary-name }}
          RELEASE_VERSION="${VERSION#v}"
          fpm -s dir -t deb -n ${{ inputs.binary-name }} -v "${RELEASE_VERSION}" -a amd64 --license MIT --url "${{ inputs.package-url }}" --description "${{ inputs.package-description }}" -C pkg usr/bin/${{ inputs.binary-name }}
          fpm -s dir -t rpm -n ${{ inputs.binary-name }} -v "${RELEASE_VERSION}" -a x86_64 --license MIT --url "${{ inputs.package-url }}" --description "${{ inputs.package-description }}" -C pkg usr/bin/${{ inputs.binary-name }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
        with:
          files: |
            ${{ matrix.artifact_name }}
            ${{ matrix.package_globs }}

      - name: Sign artifacts (Unix)
        if: ${{ secrets.gpg-private-key && runner.os != 'Windows' && github.event_name == 'release' && github.event.action == 'published' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.gpg-private-key }}
          GPG_PASSPHRASE: ${{ secrets.gpg-passphrase }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 --pinentry-mode loopback --detach-sign "${{ matrix.artifact_name }}"

      - name: Upload signed artifacts
        if: ${{ secrets.gpg-private-key && runner.os != 'Windows' && github.event_name == 'release' && github.event.action == 'published' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_name }}.asc

  checksums:
    name: Checksums
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download assets
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.event.release.tag_name }}
          latest: false
          tarBall: false
          zipBall: false

      - name: Create checksums
        run: |
          shopt -s nullglob
          files=(${{ inputs.binary-name }}-*)
          sha256sum "${files[@]}" > checksums.txt
          sha512sum "${files[@]}" > checksums-sha512.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: |
            checksums.txt
            checksums-sha512.txt
