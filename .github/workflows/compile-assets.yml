---
name: compile assets (DEPRECATED)

on:
  workflow_call:
    inputs:
      nodejs:
        type: string
        default: '24.x'
    secrets:
      GPG_BOT:
        required: true
        description: bot gpg token
      GPG_PASSPHRASE:
        required: true
        description: bot gpg passphrase
      GPG_FINGERPRINT:
        required: true
        description: bot gpg fingerprint
      BOT_TOKEN:
        required: true
        description: bot token

jobs:
  deprecated-warning:
    runs-on: ubuntu-latest
    steps:
      - name: ⚠️ DEPRECATION WARNING
        run: |
          echo "::warning file=${{ github.workflow }}::This workflow is \
          deprecated and will be removed in the future."
          echo "::warning file=${{ github.workflow }}::Please migrate to \
          'bavix/.github/.github/workflows/node-compile-assets.yml@0.5.0'"
          echo "::warning file=${{ github.workflow }}::Update your workflow \
          file to use the new name."

  compile:
    runs-on: ubuntu-latest
    needs: deprecated-warning

    env:
      NODE_ENV: production

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node ${{ inputs.nodejs }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.nodejs }}
          cache: npm

      - name: "install"
        run: npm ci

      - name: "build"
        run: npm run build
        env:
          NODE_ENV: production

      - name: "Check if build has changed"
        if: ${{ success() }}
        id: has-changes
        run: |
          {
            echo "stdout<<EOF"
            echo "$(git diff  --stat)"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: "git add"
        if: ${{ steps.has-changes.outputs.stdout }}
        run: git add --all

      - name: Import GPG key
        if: ${{ steps.has-changes.outputs.stdout }}
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_BOT }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          fingerprint: ${{ secrets.GPG_FINGERPRINT }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_committer_name: Github bot
          git_committer_email: bot@babichev.net

      - name: "Commit files"
        if: ${{ steps.has-changes.outputs.stdout }}
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          gh pr checkout ${{ github.event.pull_request.number }}
          git commit -S -m "build action" -a

      - name: "Push changes"
        if: ${{ steps.has-changes.outputs.stdout }}
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: git push -u origin HEAD
