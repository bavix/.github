---
name: rust-clippy

on:
  workflow_call:
    inputs:
      rust-version:
        type: string
        default: 'stable'
      working-directory:
        type: string
        default: '.'
      clippy-flags:
        type: string
        default: '--workspace --all-targets --all-features -- -Dwarnings'
      use-cross:
        type: boolean
        default: false
      targets:
        type: string
        default: '["x86_64-unknown-linux-gnu"]'

jobs:
  clippy:
    name: Clippy (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ fromJson(inputs.targets) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ inputs.rust-version }}
          target: ${{ matrix.target }}
          components: clippy
          cache: true
          cache-workspace: ${{ inputs.working-directory }}

      - name: Setup cross
        if: ${{ inputs.use-cross }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Run clippy (cargo)
        if: ${{ !inputs.use-cross }}
        working-directory: ${{ inputs.working-directory }}
        run: cargo clippy ${{ inputs.clippy-flags }}

      - name: Run clippy (cross)
        if: ${{ inputs.use-cross }}
        working-directory: ${{ inputs.working-directory }}
        run: cross clippy --target ${{ matrix.target }} ${{ inputs.clippy-flags }}
