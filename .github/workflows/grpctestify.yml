---
name: grpctestify

'on':
  'workflow_call':
    inputs:
      working-directory:
        type: string
        required: true
        description: Directory containing .gctf files
      grpctestify-version:
        type: string
        default: 'v1.4.6'
        description: Version of grpctestify to install
      check-only:
        type: boolean
        default: false
        description: Only validate and format .gctf files without running tests

jobs:
  grpctestify:
    name: grpctestify (${{ inputs.check-only && 'check' || 'test' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up cache for dependencies
        uses: actions/cache@v5
        with:
          path: |
            grpctestify
            grpctestify.exe
          key: >-
            deps-cache-${{ runner.os }}-grpctestify-rust-${{
            inputs.grpctestify-version }}

      - name: Install grpctestify (Unix)
        if: runner.os != 'Windows'
        run: |
          pwd >> "$GITHUB_PATH"

          if [ ! -f grpctestify ]; then
            case "$RUNNER_OS/$RUNNER_ARCH" in
              Linux/X64) grpctestify_asset="grpctestify-linux-amd64.tar.gz" ;;
              Linux/ARM64) grpctestify_asset="grpctestify-linux-arm64.tar.gz" ;;
              macOS/X64) grpctestify_asset="grpctestify-macos-amd64.tar.gz" ;;
              macOS/ARM64) grpctestify_asset="grpctestify-macos-arm64.tar.gz" ;;
              *) echo "Unsupported runner: $RUNNER_OS/$RUNNER_ARCH"; exit 1 ;;
            esac

            VERSION=${{ inputs.grpctestify-version }}
            curl -sSL "https://github.com/gripmock/grpctestify-rust/releases/download/$VERSION/$grpctestify_asset" | tar -xz
            chmod +x grpctestify
          fi

      - name: Install grpctestify (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "grpctestify.exe")) {
            $grpctestifyZip = if ($env:RUNNER_ARCH -eq "ARM64") {
              "grpctestify-windows-arm64.zip"
            } else {
              "grpctestify-windows-amd64.zip"
            }
            $VERSION = "${{ inputs.grpctestify-version }}"
            $baseUrl = "https://github.com/gripmock/grpctestify-rust/releases/download/$VERSION"
            Invoke-WebRequest -Uri "$baseUrl/$grpctestifyZip" -OutFile "grpctestify.zip"
            Expand-Archive -Path "grpctestify.zip" -DestinationPath "." -Force
            Remove-Item "grpctestify.zip" -Force
          }

          Add-Content -Path $env:GITHUB_PATH -Value (Get-Location)

      - name: Check GCTF formatting
        if: ${{ inputs.check-only }}
        working-directory: ${{ inputs.working-directory }}
        run: grpctestify fmt .

      - name: Validate GCTF files
        if: ${{ inputs.check-only }}
        working-directory: ${{ inputs.working-directory }}
        run: grpctestify check .

      - name: Run E2E tests
        if: ${{ !inputs.check-only }}
        working-directory: ${{ inputs.working-directory }}
        run: grpctestify .
