---
name: docker-builder

on:
  'workflow_call':
    inputs:
      context:
        type: string
        default: '.'
      dockerfile:
        type: string
        default: 'Dockerfile'
      image-names:
        type: string
        description: 'Comma-separated list of image names'
        required: true
      tags:
        type: string
        default: >-
          type=ref,event=branch,type=semver,pattern={{version}}
      platforms:
        type: string
        default: 'linux/amd64,linux/arm64'
      push:
        type: boolean
        default: true
      cache-from:
        type: string
        default: 'type=gha'
      cache-to:
        type: string
        default: 'type=gha,mode=max'
      build-args:
        type: string
        default: ''
      labels:
        type: string
        default: ''
    secrets:
      dockerhub-username:
        required: false
      dockerhub-token:
        required: false

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        if: >-
          ${{ inputs.push && secrets.dockerhub-username &&
          secrets.dockerhub-token }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.dockerhub-username }}
          password: ${{ secrets.dockerhub-token }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-names }}
          tags: ${{ inputs.tags }}
          labels: ${{ inputs.labels }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push && github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ inputs.platforms }}
          cache-from: ${{ inputs.cache-from }}
          cache-to: ${{ inputs.cache-to }}
          build-args: ${{ inputs.build-args }}
