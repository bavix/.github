---
name: hadolint

on:
  'workflow_call':
    inputs:
      dockerfile:
        type: string
        default: 'Dockerfile'
      dockerfile-path:
        type: string
        default: '.'
      hadolint-version:
        type: string
        default: 'v2.12.0'
      failure-threshold:
        type: string
        default: 'error'

jobs:
  hadolint:
    name: Lint dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ inputs.dockerfile }}
          dockerfile-path: ${{ inputs.dockerfile-path }}
          version: ${{ inputs.hadolint-version }}
          failure-threshold: ${{ inputs.failure-threshold }}
