---
name: hadolint (DEPRECATED)

on:
  'workflow_call':
    inputs:
      dockerfile:
        type: string
        default: 'Dockerfile'
      dockerfile-path:
        type: string
        default: '.'
      hadolint-version:
        type: string
        default: 'v2.12.0'
      failure-threshold:
        type: string
        default: 'error'

jobs:
  deprecated-warning:
    runs-on: ubuntu-latest
    steps:
      - name: ⚠️ DEPRECATION WARNING
        run: |
          echo "::warning file=${{ github.workflow }}::This workflow is deprecated and will be removed in the future."
          echo "::warning file=${{ github.workflow }}::Please migrate to 'bavix/.github/.github/workflows/docker-hadolint.yaml@0.5.0'"
          echo "::warning file=${{ github.workflow }}::Update your workflow file to use the new name."

  hadolint:
    name: Lint dockerfile
    runs-on: ubuntu-latest
    needs: deprecated-warning
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ inputs.dockerfile }}
          dockerfile-path: ${{ inputs.dockerfile-path }}
          version: ${{ inputs.hadolint-version }}
          failure-threshold: ${{ inputs.failure-threshold }}
