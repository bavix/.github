---
name: unit-tests

'on':
  'workflow_call':
    inputs:
      go-versions:
        type: string
        default: '["1.25", "1.26"]'
      working-directory:
        type: string
        default: '.'
      test-flags:
        type: string
        default: ''
      race:
        type: boolean
        default: false
      coverage:
        type: boolean
        default: false
      coverage-profile:
        type: string
        default: 'coverage.out'
      timeout:
        type: string
        default: '10m'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ${{ fromJson(inputs.go-versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: go mod download

      - name: Run tests
        working-directory: ${{ inputs.working-directory }}
        run: |
          TEST_FLAGS="${{ inputs.test-flags }}"
          if [ "${{ inputs.race }}" = "true" ]; then
            TEST_FLAGS="$TEST_FLAGS -race"
          fi
          if [ "${{ inputs.coverage }}" = "true" ]; then
            TEST_FLAGS="$TEST_FLAGS \
            -coverprofile=${{ inputs.coverage-profile }}"
          fi
          go test -v -timeout ${{ inputs.timeout }} $TEST_FLAGS ./...

      - name: Upload coverage
        if: ${{ inputs.coverage }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.go-version }}
          path: ${{ inputs.working-directory }}/${{ inputs.coverage-profile }}
