---
name: golangci-lint (DEPRECATED)

on:
  workflow_call:
    inputs:
      go-version:
        type: string
        default: '1.26'
      golangci-lint-version:
        type: string
        default: 'v2.10.1'
      working-directory:
        type: string
        default: '.'
      skip-cache:
        type: boolean
        default: false

jobs:
  deprecated-warning:
    runs-on: ubuntu-latest
    steps:
      - name: ⚠️ DEPRECATION WARNING
        run: |
          echo "::warning file=${{ github.workflow }}::This workflow is \
          deprecated and will be removed in the future."
          echo "::warning file=${{ github.workflow }}::Please migrate to \
          'bavix/.github/.github/workflows/go-golangci-lint.yml@0.5.0'"
          echo "::warning file=${{ github.workflow }}::Update your workflow \
          file to use the new name."

  golangci:
    name: lint
    runs-on: ubuntu-latest
    needs: deprecated-warning
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ inputs.golangci-lint-version }}
          skip-cache: ${{ inputs.skip-cache }}
          working-directory: ${{ inputs.working-directory }}
